  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

============================\n   REVEAL — fade-up on scroll\n   ============================================================ */\n.reveal{opacity:0;transform:translateY(28px);transition:opacity 700ms var(--ease), transform 700ms var(--ease)}\n.reveal.in{opacity:1;transform:none}\n.reveal.d1{transition-delay:80ms}\n.reveal.d2{transition-delay:160ms}\n.reveal.d3{transition-delay:240ms}\n.reveal.d4{transition-delay:320ms}\n\n/* ============================================================\n   MARQUEE — фоновый тикер\n   ============================================================ */\n.marquee{\n  position:relative;overflow:hidden;\n  border-top:1px solid var(--line);border-bottom:1px solid var(--line);\n  padding:var(--s-5) 0;background:var(--paper);\n}\n.marquee-track{\n  display:flex;gap:var(--s-7);white-space:nowrap;\n  animation:marquee 38s linear infinite;\n  font-family:var(--ff-display);font-weight:900;\n  font-size:clamp(40px,5vw,84px);line-height:1;letter-spacing:var(--ls-display);\n  text-transform:uppercase;\n}\n.marquee-track span{display:inline-flex;align-items:center;gap:var(--s-7);color:var(--ink-900)}\n.marquee-track em{font-style:normal;color:var(--red)}\n.marquee-track i{font-style:normal;color:var(--ink-200);font-family:var(--ff-mono);font-size:.3em;letter-spacing:var(--ls-mono);text-transform:uppercase;font-weight:500}\n@keyframes marquee{\n  from{transform:translateX(0)}\n  to{transform:translateX(-50%)}\n}\n.marquee:hover .marquee-track{animation-play-state:paused}\n\n/* ============================================================\n   BIG CTA — magnetic+halo\n   ============================================================ */\n.cta-mag{\n  position:relative;\n  transition:background var(--t-base) var(--ease), color var(--t-base) var(--ease);\n}\n.cta-mag::before{display:none}\n\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{\n  background:var(--paper);color:var(--ink-900);\n  font-family:var(--ff-text);font-size:16px;line-height:1.55;\n  -webkit-font-smoothing:antialiased;text-wrap:pretty;\n}\na{color:inherit;text-decoration:none}\nimg,svg{max-width:100%;display:block}\nbutton{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}\n\n.t-mono{font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--ink-500)}\n\n/* ============================================================\n   HEADER\n   ============================================================ */\n.header{\n  position:sticky;top:0;z-index:50;\n  display:flex;justify-content:space-between;align-items:center;\n  padding:var(--s-3) var(--gutter);\n  background:rgba(250,250,248,.85);backdrop-filter:blur(10px);\n  border-bottom:1px solid var(--line);\n}\n.brand{display:flex;align-items:center;gap:10px}\n.brand .mark{\n  display:inline-flex;align-items:center;justify-content:center;\n  width:36px;height:auto;color:var(--ink-900);\n}\n.brand .mark svg{width:100%;height:auto;display:block}\n.brand .wm{font-family:var(--ff-mono);font-weight:500;font-size:9px;letter-spacing:.18em;line-height:1.05;text-transform:uppercase}\n.nav-links{display:flex;gap:22px;align-items:center;font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--ink-700)}\n.nav-links a{transition:color var(--t-base) var(--ease)}\n.nav-links a:hover{color:var(--red)}\n.nav-links .lang{display:flex;gap:8px;color:var(--ink-300)}\n.nav-links .lang b{color:var(--ink-900);font-weight:500}\n.nav-cta{display:flex;align-items:center;gap:14px}\n@media (max-width:920px){.nav-links{display:none}}\n\n/* ============================================================\n   BUTTONS\n   ============================================================ */\n.btn{\n  display:inline-flex;align-items:center;gap:10px;\n  padding:14px 24px;border-radius:var(--r-pill);\n  font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);text-transform:uppercase;font-weight:500;\n  transition:background var(--t-base) var(--ease),color var(--t-base) var(--ease),border-color var(--t-base) var(--ease),transform var(--t-fast) var(--ease);\n}\n.btn:focus-visible{outline:2px solid var(--ink-900);outline-offset:3px}\n.btn::after{content:\"→\"}\n.btn--primary{background:var(--ink-900);color:#fff}\n.btn--primary:hover{background:var(--red);transform:translateY(-1px)}\n.btn--accent{background:var(--red);color:#fff}\n.btn--accent:hover{background:var(--ink-900)}\n.btn--ghost{border:1.5px solid var(--ink-900);color:var(--ink-900)}\n.btn--ghost:hover{background:var(--ink-900);color:#fff}\n.btn--ghost-paper{border:1.5px solid #fff;color:#fff}\n.btn--ghost-paper:hover{background:#fff;color:var(--ink-900)}\n.btn--sm{padding:10px 16px;font-size:10px}\n.btn--lg{padding:18px 32px;font-size:12px}\n\n.link{display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid currentColor;padding-bottom:2px;transition:color var(--t-base) var(--ease),border-color var(--t-base) var(--ease)}\n.link:hover{color:var(--red);border-color:var(--red)}\n.link::after{content:\"→\"}\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero{\n  padding:clamp(56px,7vw,112px) var(--gutter) clamp(48px,6vw,96px);\n  border-bottom:1px solid var(--line);\n}\n.hero-grid{\n  display:grid;grid-template-columns:1.45fr 1fr;gap:clamp(32px,5vw,80px);\n  align-items:end;\n}\n.hero-meta{\n  display:flex;justify-content:space-between;gap:var(--s-5);\n  font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--ink-500);\n  padding-bottom:var(--s-5);margin-bottom:clamp(36px,5vw,72px);\n  border-bottom:1px solid var(--line);\n  flex-wrap:wrap;\n}\n.hero-meta .red{color:var(--red)}\n.hero-meta a{color:inherit;transition:color var(--t-base) var(--ease)}\n.hero-meta a:hover{color:var(--ink-900)}\n.hero-meta .grp{display:inline-flex;gap:6px;align-items:center}\n.hero-meta .sep{color:var(--ink-300)}\n.hero h1{\n  font-family:var(--ff-display);font-weight:900;\n  font-size:clamp(54px,9vw,180px);line-height:1.02;letter-spacing:var(--ls-display);text-transform:uppercase;\n  max-width:14ch;\n  padding-top:.12em;\n}\n.hero h1 em{font-style:normal;color:var(--red);position:relative;display:inline-block}\n.hero h1 em::after{display:none}\n.hero h1 .ws{display:block;line-height:1.02;padding-top:.04em;padding-bottom:.02em}\n.hero h1 .ws > i{font-style:normal;display:inline-block}\n.hero-side{display:flex;flex-direction:column;gap:var(--s-5);align-self:end}\n.hero-lede{font-size:clamp(17px,1.5vw,21px);line-height:1.45;color:var(--ink-700);max-width:42ch}\n.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:var(--s-3)}\n\n.hero-stats{\n  margin-top:clamp(48px,6vw,88px);\n  display:grid;grid-template-columns:repeat(4,1fr);\n  border-top:1px solid var(--ink-900);\n  border-bottom:1px solid var(--ink-900);\n}\n.hero-stats .stat{padding:var(--s-6) var(--s-5);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:var(--s-3)}\n.hero-stats .stat:nth-child(4n){border-right:0}\n.hero-stats .v{font-family:var(--ff-display);font-weight:900;font-size:clamp(32px,4vw,64px);line-height:.9;letter-spacing:var(--ls-display);font-variant-numeric:tabular-nums}\n.hero-stats .v em{font-style:normal;color:var(--red)}\n.hero-stats .k{font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--ink-500)}\n@media (max-width:1024px){.hero-grid{grid-template-columns:1fr}}\n@media (max-width:760px){.hero-stats{grid-template-columns:repeat(2,1fr)}}\n\n/* ============================================================\n   SECTION SHELL\n   ============================================================ */\nsection{padding:clamp(64px,8vw,128px) var(--gutter);border-bottom:1px solid var(--line)}\nsection.alt{background:var(--paper-2)}\nsection.ink{background:var(--ink-900);color:#fff;border-color:transparent}\nsection.ink .ink-line{border-color:rgba(255,255,255,.18)!important}\nsection.ink .muted{color:rgba(255,255,255,.55)}\n\n.section-head{\n  display:grid;\n  grid-template-columns:1fr auto;\n  grid-template-areas:\n    \"num   .\"\n    \"title aside\";\n  column-gap:clamp(20px,3vw,48px);\n  row-gap:var(--s-3);\n  align-items:end;\n  padding-bottom:var(--s-5);margin-bottom:clamp(40px,5vw,72px);\n  border-bottom:1px solid var(--line);\n}\nsection.ink .section-head{border-color:rgba(255,255,255,.18)}\n.section-head .num{grid-area:num;font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--red);white-space:nowrap}\n.section-head h2{grid-area:title;font-family:var(--ff-display);font-weight:900;font-size:clamp(36px,5.5vw,84px);line-height:.95;letter-spacing:var(--ls-display);text-transform:uppercase;margin:0}\n.section-head h2 em{font-style:normal;color:var(--red)}\n.section-head .aside{grid-area:aside;font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--ink-500);max-width:30ch;text-align:right;align-self:end;padding-bottom:14px}\nsection.ink .section-head .aside{color:rgba(255,255,255,.55)}\n@media (max-width:760px){.section-head{grid-template-columns:1fr;grid-template-areas:\"num\" \"title\" \"aside\"}.section-head .aside{text-align:left;max-width:none}}\n\n/* ============================================================\n   DIRECTIONS LIST\n   ============================================================ */\n.dir-list{border-top:1.5px solid currentColor}\n.dir-list a{\n  display:grid;grid-template-columns:80px 1fr 1fr 64px;gap:var(--s-5);align-items:center;\n  padding:clamp(28px,3.5vw,44px) 0;border-bottom:1px solid var(--line);\n  transition:padding var(--t-base) var(--ease),background var(--t-base) var(--ease),color var(--t-base) var(--ease);\n  position:relative;\n}\nsection.ink .dir-list a{border-bottom-color:rgba(255,255,255,.18)}\n.dir-list a:hover{background:var(--ink-900);color:#fff;padding-left:var(--s-5);padding-right:var(--s-5)}\nsection.ink .dir-list a:hover{background:var(--red);color:#fff}\n.dir-list .num{font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);color:var(--ink-300);transition:color var(--t-base) var(--ease)}\nsection.ink .dir-list .num{color:rgba(255,255,255,.4)}\n.dir-list a:hover .num{color:rgba(255,255,255,.5)}\n.dir-list .name{font-family:var(--ff-display);font-weight:900;font-size:clamp(28px,4.4vw,72px);line-height:1;letter-spacing:var(--ls-display);text-transform:uppercase}\n.dir-list .desc{font-size:14px;line-height:1.45;color:var(--ink-500);max-width:38ch}\nsection.ink .dir-list .desc{color:rgba(255,255,255,.6)}\n.dir-list a:hover .desc{color:rgba(255,255,255,.7)}\n.dir-list .arr{\n  width:48px;height:48px;border-radius:50%;border:1px solid currentColor;\n  display:flex;align-items:center;justify-content:center;\n  font-family:var(--ff-mono);font-size:14px;\n  transition:transform var(--t-base) var(--ease),background var(--t-base) var(--ease),border-color var(--t-base) var(--ease),color var(--t-base) var(--ease);\n  justify-self:end;\n}\n.dir-list a:hover .arr{transform:rotate(-45deg);background:var(--red);border-color:var(--red);color:#fff}\nsection.ink .dir-list a:hover .arr{background:#fff;border-color:#fff;color:var(--red)}\n@media (max-width:900px){\n  .dir-list a{grid-template-columns:60px 1fr 48px;grid-template-rows:auto auto;}\n  .dir-list .desc{grid-column:2/4}\n}\n\n/* ============================================================\n   SERVICES GRID — что внутри направлений\n   ============================================================ */\n.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--ink-900);border-bottom:1px solid var(--ink-900)}\n.svc{\n  padding:var(--s-6);border-right:1px solid var(--line);border-bottom:1px solid var(--line);\n  display:flex;flex-direction:column;gap:var(--s-3);\n  transition:background var(--t-base) var(--ease);\n}\n.svc:hover{background:var(--paper-card)}\n.svc:nth-child(3n){border-right:0}\n.svc:nth-last-child(-n+3){border-bottom:0}\n.svc .meta{font-family:var(--ff-mono);font-size:10px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--red)}\n.svc h3{font-family:var(--ff-display);font-weight:700;font-size:22px;line-height:1.15}\n.svc ul{list-style:none;display:grid;gap:6px;font-size:14px;color:var(--ink-700);margin-top:var(--s-2)}\n.svc li{padding-left:14px;position:relative}\n.svc li::before{content:\"\";position:absolute;left:0;top:.7em;width:8px;height:1px;background:var(--ink-300)}\n@media (max-width:900px){.services-grid{grid-template-columns:1fr}.svc{border-right:0}.svc:nth-last-child(-n+3){border-bottom:1px solid var(--line)}.svc:last-child{border-bottom:0}}\n\n/* ============================================================\n   CASES — большая editorial-сетка\n   ============================================================ */\n.cases{display:grid;grid-template-columns:repeat(12,1fr);gap:clamp(20px,3vw,40px) var(--s-5);align-items:end}\n.case{display:flex;flex-direction:column;gap:var(--s-4);cursor:pointer;min-width:0}\n.case .ph{\n  aspect-ratio:4/3;\n  background:linear-gradient(135deg,var(--ink-900),#3a3a3a);\n  border-radius:2px;\n  display:flex;align-items:flex-end;justify-content:flex-start;\n  padding:var(--s-5);color:rgba(255,255,255,.45);\n  font-family:var(--ff-mono);font-size:10px;letter-spacing:var(--ls-mono);text-transform:uppercase;\n  position:relative;overflow:hidden;\n  transition:transform var(--t-slow) var(--ease);\n  will-change:transform;\n}\n.case .ph::after{\n  content:\"VIEW →\";position:absolute;right:var(--s-5);top:var(--s-5);\n  width:72px;height:72px;border-radius:50%;background:var(--red);color:#fff;\n  display:flex;align-items:center;justify-content:center;\n  font-family:var(--ff-mono);font-size:10px;letter-spacing:var(--ls-mono);font-weight:500;\n  transform:scale(0);transition:transform 380ms var(--ease);\n}\n.case:hover .ph{transform:scale(1.015)}\n.case:hover .ph::after{transform:scale(1)}\n.case .info .ttl{transition:color var(--t-base) var(--ease)}\n.case:hover .info .ttl{color:var(--red)}\n.case .ph::before{content:\"\";position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 12px,transparent 12px 24px)}\n.case .ph.tone-red{background:linear-gradient(135deg,var(--red) 0%,#7a1810 100%)}\n.case .ph.tone-paper{background:var(--paper-2);color:var(--ink-300)}\n.case .ph.tone-ink{background:var(--ink-900)}\n\n.case .info{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:var(--s-4);align-items:end}\n.case .info > div{min-width:0}\n.case .info .ttl{font-family:var(--ff-display);font-weight:800;font-size:clamp(16px,1.4vw,20px);line-height:1.1;letter-spacing:var(--ls-display);text-transform:uppercase;hyphens:none;overflow-wrap:normal;word-break:keep-all;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.case-1 .info .ttl, .case-2 .info .ttl{font-size:clamp(18px,1.7vw,24px)}\n.case .info .meta{font-family:var(--ff-mono);font-size:10px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--red);margin-bottom:6px}\n.case .info .metric{font-family:var(--ff-display);font-weight:900;font-size:clamp(28px,3.2vw,44px);line-height:.9;letter-spacing:var(--ls-display);white-space:nowrap}\n.case .info .metric small{display:block;font-family:var(--ff-mono);font-size:9px;letter-spacing:var(--ls-mono);text-transform:uppercase;color:var(--ink-500);font-weight:500;margin-top:6px}\n\n/* layout positions */\n.case-1{grid-column:1/8}\n.case-2{grid-column:8/13}\n.case-3{grid-column:1/5}\n.case-4{grid-column:5/9}\n.case-5{grid-column:9/13}\n@media (max-width:1100px){.case-3,.case-4,.case-5{grid-column:span 6}}\n@media (max-width:900px){.case-1,.case-2,.case-3,.case-4,.case-5{grid-column:1/-1}}\n\n/* ============================================================\n   CLIENTS — лента логотипов как маркеры\n   =====    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CASES ============ -->\n<section id=\"cases\" data-screen-label=\"04 Cases\">\n  <div class=\"section-head\">\n    <span class=\"num\">— 03 / Работы<\u002Fspan>\n    <h2>Избранное<\u002Fh2>\n    <span class=\"aside\">— Пять проектов из&nbsp;двухсот сорока. Полный список&nbsp;— на&nbsp;<a href=\"#\" class=\"link\">странице работ<\u002Fa>.<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"cases\">\n    <article class=\"case case-1\">\n      <div class=\"ph tone-red\">— Bayan&nbsp;/ Brand identity / 4:3<\u002Fdiv>\n      <div class=\"info\">\n        <div>\n          <div class=\"meta\">Bayan · 2025 · Brand identity<\u002Fdiv>\n          <div class=\"ttl\">Айдентика&nbsp;FMCG<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"metric\">+38<em style=\"font-style:normal;color:var(--red)\">%<\u002Fem><small>retail sell-through<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"case case-2\">\n      <div class=\"ph tone-ink\">— Kapsula&nbsp;/ Apparel<\u002Fdiv>\n      <div class=\"info\">\n        <div>\n          <div class=\"meta\">Kapsula · 2024 · Apparel<\u002Fdiv>\n          <div class=\"ttl\">Корп.&nbsp;одежда<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"metric\">1.2<small style=\"color:var(--ink-500)\">k units<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"case case-3\">\n      <div class=\"ph tone-paper\" style=\"color:var(--ink-500)\">— Orient Bank&nbsp;/ Web<\u002Fdiv>\n      <div class=\"info\">\n        <div>\n          <div class=\"meta\">Orient · 2025 · Web<\u002Fdiv>\n          <div class=\"ttl\">Сайт&nbsp;банка&nbsp;Orient<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"case case-4\">\n      <div class=\"ph\">— Sayyod&nbsp;/ Campaign<\u002Fdiv>\n      <div class=\"info\">\n        <div>\n          <div class=\"meta\">Sayyod · 2024 · Campaign<\u002Fdiv>\n 02Fspan>\n    <h2>Как&nbsp;<em>работаем<\u002Fem><\u002Fh2>\n    <span class=\"aside\">— Срок от&nbsp;первого письма до&nbsp;старта&nbsp;— 7&nbsp;дней. От&nbsp;старта до&nbsp;первого результата&nbsp;— 30.<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"process\">\n    <div class=\"step\">\n      <span class=\"n\">01<\u002Fspan>\n      <h3>Бриф<\u002Fh3>\n      <p>Заполняете форму или&nbsp;звоним голосом. Чётко фиксируем цель, ограничения, бюджет.<\u002Fp>\n      <span class=\"when\">— Day 0–2<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <span class=\"n\">02<\u002Fspan>\n      <h3>Команда &amp; план<\u002Fh3>\n      <p>Собираем команду из&nbsp;нужных направлений. План этапов и&nbsp;цен&nbsp;— в&nbsp;одном документе.<\u002Fp>\n      <span class=\"when\">— Day 3–7<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <span class=\"n\">03<\u002Fspan>\n      <h3>Спринты<\u002Fh3>\n      <p>Работаем итерациями по&nbsp;2&nbsp;недели. Демо&nbsp;— в&nbsp;каждом конце спринта.<\u002Fp>\n      <span class=\"when\">— Day 8–60<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <span class=\"n\">04<\u002Fspan>\n      <h3>Запуск &amp; сопровождение<\u002Fh3>\n      <p>Сдаём проект, остаёмся на&nbsp;поддержке. Первые метрики&nbsp;— через 30 дней после старта.<\u002Fp>\n      <span class=\"when\">— Day 60+<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ABOUT ============ -->\n<section id=\"about\" data-screen-label=\"07 About\">\n  <div class=\"section-head\">\n    <span class=\"num\">— 06 / О&nbsp;нас<\u002Fspan>\n    <h2>Группа из&nbsp;трёх<br>компаний.<\u002Fh2>\n    <span class=\"aside\">— Команда&nbsp;— 80&nbsp;человек. Tashkent, Dubai, удалённо.<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:clamp(32px,5vw,80px);align-items:start\">\n    <div style=\"display:grid;gap:var(--s-5);font-size:18px;line-height:1.55;color:var(--ink-700);max-width:62ch\">\n      <p>Мы&nbsp;объединили три отдельные компании в&nbsp;одну группу, потому&nbsp;что клиенту проще иметь дело с&nbsp;одним подрядчиком. Не&nbsp;потому, что мы&nbsp;дешевле&nbsp;— потому, что одна команда быстрее принимает решения.<\u002Fp>\n      <p>Marketing&nbsp;&amp; Research отвечает за&nbsp;«что и&nbsp;кому». Production&nbsp;— «в&nbsp;чём это&nbsp;увидят». IT&nbsp;— «через какие касания». Внутри одного проекта они&nbsp;сидят за&nbsp;одним столом.<\u002Fp>\n      <p style=\"margin-top:var(--s-3)\">\n        <a href=\"#\" class=\"link\" style=\"font-family:var(--ff-mono);font-size:11px;letter-spacing:var(--ls-mono);text-transform:uppercase\">Полная&nbsp;история компании<\u002Fa>\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;gap:var(--s-5)\">\n      <div style=\"border-top:1.5px solid var(--ink-900);padding-top:var(--s-4)\">\n        <span class=\"t-mono\" style=\"color:var(--red)\">— Tashkent · HQ<\u002Fspan>\n        <p style=\"font-family:var(--ff-display);font-weight:700;font-size:20px;line-height:1.2;margin-top:6px\">ул.&nbsp;Шарафа Рашидова, 17, 5 этаж<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top:1.5px solid var(--ink-900);padding-top:var(--s-4)\">\n        <span class=\"t-mono\" style=\"color:var(--red)\">— Dubai · Office<\u002Fspan>\n        <p style=\"font-family:var(--ff-display);font-weight:700;font-size:20px;line-height:1.2;margin-top:6px\">DMCC Business Centre, Lvl 1<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top:1.5px solid var(--ink-900);padding-top:var(--s-4)\">\n        <span class=\"t-mono\" style=\"color:var(--red)\">— Команда<\u002Fspan>\n        <p style=\"font-family:var(--ff-display);font-weight:900;font-size:48px;line-height:1;letter-spacing:var(--ls-display);margin-top:6px\">80<em style=\"font-style:normal;color:var(--red)\">/<\u002Fem>3<\u002Fp>\n        <p class=\"t-mono\" style=\"margin-top:6px\">— человек / направления<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- n  <\u002Fdiv>\n  <div class=\"col\">\n    <strong>Сайт<\u002Fstrong>\n    <ul>\n      <li><a href=\"#cases\">Работы<\u002Fa><\u002Fli>\n      <li><a href=\"#process\">Процесс<\u002Fa><\u002Fli>\n      <li><a href=\"#about\">О&nbsp;нас<\u002Fa><\u002Fli>\n      <li><a href=\"#brief\">Контакты<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n  <div class=\"col\">\n    <strong>Контакты<\u002Fstrong>\n    <ul>\n      <li><a href=\"mailto:brief@premiumselection.uz\">brief@premiumselection.uz<\u002Fa><\u002Fli>\n      <li><a href=\"tel:+998712000000\">+998 71 200 00 00<\u002Fa><\u002Fli>\n      <li>Tashkent · Dubai<\u002Fli>\n      <li><a href=\"#\">Telegram<\u002Fa> · <a href=\"#\">Instagram<\u002Fa> · <a href=\"#\">LinkedIn<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n  <div class=\"footer-bottom\">\n    <span><strong>© Premium Selection, 2018–2026<\u002Fstrong><\u002Fspan>\n    <span>Сайт собран на&nbsp;P/S System v1.0<\u002Fspan>\n    <span><a href=\"#\">Политика конфиденциальности<\u002Fa><\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// Scroll progress\nconst sp = document.getElementById('scrollProgress');\nconst onScroll = () => {\n  const h = document.documentElement;\n  const scrolled = h.scrollTop / (h.scrollHeight - h.clientHeight);\n  sp.style.width = (scrolled * 100) + '%';\n};\ndocument.addEventListener('scroll', onScroll, {passive:true}); onScroll();\n\n// Reveal on scroll\nconst io = new IntersectionObserver((entries)=>{\n  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });\n},{threshold:.12, rootMargin:'0px 0px -80px 0px'});\ndocument.querySelectorAll('.section-head, .dir-list a, .svc, .case, .step, .cli, .stat, .hero-cta, .hero-lede')\n  .forEach((el,i)=>{ el.classList.add('reveal'); if(i%4===1)el.classList.add('d1'); if(i%4===2)el.classList.add('d2'); if(i%4===3)el.classList.add('d3'); io.observe(el); });\n\n// Magnetic CTA — disabled per user request\n// (kept hook for potential future use)\n\n// Stats count-up\nconst animateNum = (el, to, suffix='') => {\n  const dur = 1400; const start = performance.now();\n  const tick = (t)=>{\n    const p = Math.min(1, (t-start)/dur);\n    const eased = 1 - Math.pow(1-p, 3);\n    const val = Math.floor(eased * to);\n    el.firstChild.nodeValue = String(val).padStart(2,'0');\n    if(p<1) requestAnimationFrame(tick);\n    else el.firstChild.nodeValue = String(to).padStart(2,'0');\n  };\n  requestAnimationFrame(tick);\n};\nconst statIO = new IntersectionObserver((entries)=>{\n  entries.forEach(e=>{\n    if(e.isIntersecting){\n      const v = e.target;\n      const target = parseInt(v.dataset.to,10);\n      animateNum(v, target);\n      statIO.unobserve(v);\n    }\n  });\n},{threshold:.5});\ndocument.querySelectorAll('.hero-stats .v[data-to]').forEach(v=>statIO.observe(v));\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
